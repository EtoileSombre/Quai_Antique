services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: quai_antique_app
    ports:
      - "8082:80"
    volumes:
      - ../:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started

  db:
    image: mysql:8.3
    container_name: quai_antique_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: quai_antique
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: quai_user
      MYSQL_PASSWORD: quai_password
    ports:
      - "3307:3306"
    volumes:
      - quai_antique_data:/var/lib/mysql
      - ../app/sql/structure.sql:/docker-entrypoint-initdb.d/structure.sql
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: quai_antique_pma
    restart: always
    ports:
      - "8092:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: quai_antique_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - quai_antique_mongo_data:/data/db

volumes:
  quai_antique_data:
  quai_antique_mongo_data:
