services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: quai_antique_app
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: quai_antique_db
    restart: always
    environment:
      MYSQL_DATABASE: quai_antique
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: quai_user
      MYSQL_PASSWORD: quai_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: quai_antique_pma
    restart: always
    ports:
      - "8092:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
